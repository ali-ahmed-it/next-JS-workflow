name: deploy next js app

on:
  push:
   branches:  [ main ]

jobs:
  build:
    runs-on:  ubuntu-latest

    concurrency: 
      group: deploy
      cancel-in-progress: true

    steps:
      - name: checkout repository
        uses: actions/checkout@v6.0.2
      - name: install dependencies
        run: npm install
      - name: build Next.JS app
        run: npm run build 
      - name: deploy app
        run: echo "deploying app..."
  
        
  
